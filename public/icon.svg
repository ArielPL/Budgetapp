<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="coin" cx="0.42" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="0.35" stop-color="#fcd34d"/>
      <stop offset="0.75" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- coin body -->
  <circle cx="256" cy="256" r="158" fill="#b45309"/>
  <circle cx="256" cy="252" r="158" fill="url(#coin)"/>
  <circle cx="256" cy="252" r="128" fill="none" stroke="#b45309" stroke-width="6" opacity="0.35"/>

  <!-- top shine -->
  <ellipse cx="256" cy="148" rx="104" ry="42" fill="url(#shine)"/>

  <!-- Caesar profile (facing left), engraved gold -->
  <g fill="#92400e">
    <!-- head + neck + diagonal bust truncation -->
    <path d="M268 172
             C230 170 202 196 198 232
             C197 239 193 244 187 248
             C176 252 168 256 171 263
             C174 270 188 268 195 273
             C186 277 189 287 199 290
             C191 296 195 307 211 310
             C220 319 235 325 254 326
             L262 366
             L330 378
             C334 330 340 292 340 246
             C340 202 308 172 268 172 Z"/>

    <!-- laurel wreath hugging the crown -->
    <g fill="#78350f">
      <ellipse cx="214" cy="206" rx="19" ry="8" transform="rotate(-58 214 206)"/>
      <ellipse cx="232" cy="184" rx="19" ry="8" transform="rotate(-42 232 184)"/>
      <ellipse cx="254" cy="170" rx="19" ry="8" transform="rotate(-24 254 170)"/>
      <ellipse cx="280" cy="166" rx="19" ry="8" transform="rotate(-6 280 166)"/>
      <ellipse cx="306" cy="176" rx="19" ry="8" transform="rotate(16 306 176)"/>
      <ellipse cx="326" cy="198" rx="18" ry="8" transform="rotate(38 326 198)"/>
      <!-- wreath tie at back -->
      <circle cx="338" cy="216" r="7"/>
    </g>
  </g>
</svg>
