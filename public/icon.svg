<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="coin" cx="0.42" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="0.35" stop-color="#fcd34d"/>
      <stop offset="0.75" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- coin body -->
  <circle cx="256" cy="256" r="158" fill="#b45309"/>
  <circle cx="256" cy="252" r="158" fill="url(#coin)"/>

  <!-- inner ring -->
  <circle cx="256" cy="252" r="128" fill="none" stroke="#b45309" stroke-width="7" opacity="0.4"/>

  <!-- top shine -->
  <ellipse cx="256" cy="150" rx="110" ry="46" fill="url(#shine)"/>

  <!-- kr mark -->
  <text x="256" y="258" font-family="Arial, Helvetica, sans-serif" font-size="150"
        font-weight="800" fill="#92400e" text-anchor="middle" dominant-baseline="central">kr</text>
</svg>
